name: Daily EvoScout Aggregator

on:
  schedule:
    # Runs at 16:00 UTC every day. 
    # 16:00 UTC is exactly 12:00 PM (Noon) Eastern Daylight Time (EDT).
    # You can comfortably adjust the hour below if you are in a different timezone.
    - cron: '0 16 * * *'
  
  # This allows you to manually trigger the workflow from the Actions tab in GitHub if needed.
  workflow_dispatch:

jobs:
  execute-scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Next.js API Route for Daily Pull
        run: |
          echo "Initiating POST request to EvoScout Aggregator..."
          
          # IMPORTANT: Replace the URL below with your actual deployed website URL (Vercel, Firebase Hosting, etc).
          curl -X POST \
               -H "Content-Type: application/json" \
               -s \
               -o /dev/null \
               -w "HTTP Status: %{http_code}\n" \
               https://evoscout.vercel.app/api/aggregate
          
          echo "Scrape trigger dispatched."
