name: Daily AI Podcast & Scraper Worker

on:
  schedule:
    - cron: '0 8 * * *' # Runs every day at 8am UTC
  workflow_dispatch: # Allows manual trigger from Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies (ffmpeg for Audio)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend_worker/requirements.txt

    - name: Run Backend Scraper & Audio Generation
      env:
        FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # Default Pexels token logic is in the script, or you can add it safely here:
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      run: |
        python backend_worker/main.py
