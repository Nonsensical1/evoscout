name: Daily EvoScout Pipeline (Scrape + Podcast)

on:
  schedule:
    - cron: '0 8 * * *' # Runs every day at 8am UTC (4am EDT)
  repository_dispatch:
    types: [manual-trigger]
  workflow_dispatch: # Allows manual trigger from Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Trigger Daily Scrape (Aggregator)
      run: |
        echo "Initiating daily data aggregation..."
        curl -X POST \
             -H "Content-Type: application/json" \
             -s \
             -o /dev/null \
             -w "HTTP Status: %{http_code}\n" \
             -d "{\"isAutomated\": true}" \
             https://evoscout.vercel.app/api/aggregate
        echo "Scrape complete."

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
        cache-dependency-path: backend_worker/requirements.txt

    - name: Install System Dependencies (ffmpeg & espeak-ng for Audio)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg espeak-ng

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend_worker/requirements.txt

    - name: Cache Kokoro Models
      id: cache-kokoro
      uses: actions/cache@v4
      with:
        path: |
          backend_worker/kokoro-v1.0.onnx
          backend_worker/voices-v1.0.bin
        key: kokoro-models-v1.0

    - name: Download Kokoro-ONNX Models
      if: steps.cache-kokoro.outputs.cache-hit != 'true'
      run: |
        wget -q https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.onnx -O backend_worker/kokoro-v1.0.onnx
        wget -q https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin -O backend_worker/voices-v1.0.bin


    - name: Run AI Podcast Generation
      env:
        FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        MODAL_APP_URL: ${{ secrets.MODAL_APP_URL }}
      run: |
        python backend_worker/main.py
